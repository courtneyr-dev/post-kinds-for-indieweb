name: Visual Baselines

# Regenerates the Linux visual-regression baselines on the same runner
# image the CI e2e job uses (font rendering must match, see #66), then
# commits any changed baselines back to the branch this was dispatched
# on. Screenshots are also uploaded as an artifact for eyeball review.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate Linux baselines
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build:prod

      - name: Start wp-env
        run: npm run env:start

      # Persist the dismissed welcome guide server-side before any editor
      # page loads. The in-page preferences dispatch races store hydration
      # on a fresh database — the first baseline run baked the welcome
      # guide modal into every screenshot.
      - name: Dismiss editor welcome guide
        run: npx wp-env run cli wp user meta update admin wp_persisted_preferences --format=json '{"core":{"welcomeGuide":false},"core/edit-post":{"welcomeGuide":false},"_modified":"2026-01-01T00:00:00.000Z"}'

      - name: Regenerate baselines
        run: npx playwright test tests/e2e/visual-regression.spec.js --project=chromium --update-snapshots

      - name: Upload baselines for review
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-baselines
          path: tests/e2e/__screenshots__/
          retention-days: 7

      - name: Commit and push baselines
        run: |
          if git status --porcelain tests/e2e/__screenshots__ | grep -q .; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tests/e2e/__screenshots__
            git commit -m "test: regenerate Linux visual baselines on the CI runner image"
            git push
          else
            echo "Baselines unchanged; nothing to commit."
          fi
